common:
  # The number of historical images
  img_history_size: 2
  # The number of future actions to predict
  action_chunk_size: 64
  # The number of cameras to be used in the model
  num_cameras: 3
  # Dimension for state/action, we use the same space for both state and action
  # This MUST be equal to configs/state_vec.py
  state_dim: 128

  # Training: motion latent is precomputed per-step (61-frame window baked in by precache)
  # so dataset loads current step only → latent_window_size_past = 0
  latent_window_size_past: 0
  latent_window_size_future: 0
  latent_interval: 1
  # Inference: re-encode 61 raw frames every step → 16 latent frames via VAE /4
  sparse_img_history_size: 61   # 61 raw frames → VAE → 16 latent frames for motion stream
  sparse_img_interval: 1


dataset:
  # We will extract the data from raw dataset
  # and store them in the disk buffer by producer
  # When training, we will read the data 
  # randomly from the buffer by consumer
  # The producer will replace the data which has been 
  # read by the consumer with new data

  # The path to the buffer (at least 400GB)
  buf_path: /path/to/buffer
  # The number of chunks in the buffer
  buf_num_chunks: 512
  # The number of samples (step rather than episode) in each chunk
  buf_chunk_size: 512

  # We will filter the episodes with length less than `epsd_len_thresh_low`
  epsd_len_thresh_low: 32
  # For those more than `epsd_len_thresh_high`,
  # we will randomly sample `epsd_len_thresh_high` steps each time we load the episode
  # to better balance the training datasets
  epsd_len_thresh_high: 2048
  # How to fit the image size
  image_aspect_ratio: pad
  # Maximum number of language tokens
  tokenizer_max_length: 1024

model:
  # Config for condition adpators
  use_framepack: true
  lang_adaptor: mlp2x_gelu
  img_adaptor: mlp2x_gelu
  state_adaptor: mlp3x_gelu
  framepack_adaptor: mlp2x_gelu
  framepack_encoder_adaptor: mlp2x_gelu
  # Legacy fields kept for backward compatibility
  lang_token_dim: 4096
  img_token_dim: 1152
  state_token_dim: 128
  framepack_encoder_token_num: 1241 # 729+512
  framepack_encoder_token_dim: 3072
  
  # No VideoTokenCompressor — WAN tokens direct → LayerNorm → framepack_adaptor (3072→core_hidden)
  # raw    1f @ [480,832]:  latent [C,1,30,52], patchify(1,2,2) → 1×15×26 = 390 tokens
  # motion 61f @ [224,224]: VAE /4 → latent [C,16,14,14], patchify → 16×7×7 = 784 tokens
  # total = 390 + 784 = 1174
  use_framepack_compression: true
  framepack_compressed_dim: 3072
  framepack_compressed_tokens: 1174  # = raw(390) + motion(784); used for pos_embed in RDT
  token_compressor_depth: 0
  token_compressor_heads: 8

  use_dual_stream_framepack: true
  dual_stream_framepack:
    raw_stream:
      num_frames: 1          # 1 raw frame, stored as image_latents_head [C,1,30,52]
      video_size: [480, 832] # latent 30×52 → patchify → 15×26 = 390 tokens
      extraction: "sobel"    # spatial Sobel edge before WAN forward
    motion_stream:
      num_frames: 61         # 61 raw input frames → VAE /4 → 16 latent frames
      latent_num_frames: 16  # VAE temporal compression: 61 frames → 16 latent frames
      video_size: [224, 224] # latent 14×14 → patchify → 7×7×16 = 784 tokens; stored as image_latents_motion
      extraction: "fft"      # temporal bandpass filter before WAN forward
  # Config for RDT structure
  core:
    hidden_size: 2048
    depth: 28
    num_heads: 32
    cond_pos_embed_type: multimodal
    # FramePack motion feature dimensions
    motion_dim: 3072        # WAN hidden size (24 heads × 128 = 3072)
    motion_cond_len: 1174   # = raw(390) + motion(784) tokens
  # For noise scheduler
  noise_scheduler:
    type: ddpm
    num_train_timesteps: 1000
    num_inference_timesteps: 5
    beta_schedule: squaredcos_cap_v2  # Critical choice
    prediction_type: sample
    clip_sample: False
  # For EMA (params averaging)
  # We do not use EMA currently
  ema:
    enabled: true  # EMA enabled
    update_after_step: 0
    inv_gamma: 1.0
    power: 0.75
    min_value: 0.0
    max_value: 0.9999

# Wan2.2 world-model integration config. This example hard-codes the paths so
# you can see the expected layout; the template uses ${VIDEO2ACT_WAN_*} env
# vars instead. Replace `/path/to/...` below with your local weights root.
framepack:
  dit_path: "/path/to/Wan2.2-5B-Robot/checkpoint.safetensors"
  vae_path: "/path/to/wan-t2v-5b/Wan2.2_VAE.pth"
  text_encoder1_path: "/path/to/wan-t2v-5b/models_t5_umt5-xxl-enc-bf16.pth"
  text_encoder2_path: null
  tokenizer_path: "/path/to/google/umt5-xxl"
  # # LoRA weights
  # lora_weight:
  #   - "/path/to/optional/lora/train_lora.safetensors"
  # lora_multiplier: 1.0

  video_size: [480, 832]
  fps: 16
  guidance_scale: 1.0
  latent_window_size: 1

  num_single_layers: 0
  attn_mode: "torch"
  vae_chunk_size: 32
  vae_spatial_tile_sample_min_size: 128

  # Slow-fast WAN feature cache (eval-only). Cache the adapted_hidden_states
  # from WAN and reuse for `cache_ratio - 1` calls before recomputing. Has no
  # effect during training. Override at launch with env var
  # VIDEO2ACT_CACHE_RATIO=N (also forces enable_cache=true).
  enable_cache: true
  cache_ratio: 8

  motion_extraction:
    filter_type: "bandpass"   # 'bandpass' or 'lowpass'
    freq_low: 1.0             # Drop DC / static background; at fps=16 each bin = 1Hz
    freq_high: 7.0            # Keep bin 1-7, Nyquist=8Hz
    prop_motion: 0.04         # MOFT: kept-channel ratio (0.04 x 48 ~= 2 channels)
